name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run backend tests
        run: ./mvnw test

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web-client
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/web-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web client
        run: npm run build

  ai-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-rag
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-rag/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile AI source
        run: python -m compileall src

  docker-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate docker compose
        run: docker compose --env-file deploy/env/docker.env.example -f docker-compose.yml config >/dev/null
