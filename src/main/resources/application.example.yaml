server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: campus-runner

  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/campus_runner?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:runner}
    password: ${DB_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.runner.entity
  configuration:
    map-underscore-to-camel-case: true

ai:
  service:
    url: ${AI_SERVICE_URL:http://127.0.0.1:8000}

logging:
  level:
    org.springframework.web: info
    com.campus.runner.mapper: debug
