spring:
  datasource:
    url: jdbc:h2:mem:campus_runner;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      encoding: UTF-8

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.runner.entity
  configuration:
    map-underscore-to-camel-case: true
