services:
  mariadb:
    image: mariadb:11
    container_name: ${COMPOSE_PROJECT_NAME:-campus-runner}-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_runner}
      MYSQL_USER: ${DB_USERNAME:-runner}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./deploy/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-campus-runner}-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-campus-runner}-backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mariadb:3306/${MYSQL_DATABASE:-campus_runner}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-runner}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE:-never}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_AUTH_ENABLED: ${REDIS_AUTH_ENABLED:-false}
      AI_SERVICE_URL: http://ai-rag:8000
      FEISHU_SHEET_ENABLED: ${FEISHU_SHEET_ENABLED:-false}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_SPREADSHEET_TOKEN: ${FEISHU_SPREADSHEET_TOKEN:-}
      FEISHU_ORDER_RANGE: ${FEISHU_ORDER_RANGE:-Sheet1!A:O}
      FEISHU_USER_RANGE: ${FEISHU_USER_RANGE:-Sheet1!A:G}
      FEISHU_SYNC_CRON: "${FEISHU_SYNC_CRON:-0 5 0 * * ?}"
      FEISHU_SYNC_ZONE: ${FEISHU_SYNC_ZONE:-Asia/Shanghai}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health/readiness >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  ai-rag:
    build:
      context: ./ai-rag
    container_name: ${COMPOSE_PROJECT_NAME:-campus-runner}-ai-rag
    restart: unless-stopped
    environment:
      CAMPUS_API_BASE: http://backend:8080
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_BASE_URL: ${GLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4/}
      GLM_MODEL: ${GLM_MODEL:-glm-4}
      BGE_RERANKER_URL: ${BGE_RERANKER_URL:-}
      CHROMA_DB_PATH: /app/data/chroma_db
      RAG_RAW_DATA_PATH: /app/data/raw/jxau_real_rules.txt
      RAG_SEARCH_K: ${RAG_SEARCH_K:-10}
      RAG_TOP_N: ${RAG_TOP_N:-3}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-200}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-30}
      AGENT_LOG_PATH: /app/logs/agent_events.jsonl
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - ./ai-rag/data/raw:/app/data/raw:ro
      - ai_rag_chroma:/app/data/chroma_db
      - ai_rag_logs:/app/logs

  web:
    build:
      context: ./frontend/web-client
    container_name: ${COMPOSE_PROJECT_NAME:-campus-runner}-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mariadb_data:
  redis_data:
  ai_rag_chroma:
  ai_rag_logs:
